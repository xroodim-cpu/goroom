<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="고룸 GOROOM"/>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    @font-face { font-family:'KakaoSmallFont'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2503@1.0/KakaoSmallSans-Light.woff2') format('woff2'); font-weight:300; font-display:swap; }
    @font-face { font-family:'KakaoSmallFont'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2503@1.0/KakaoSmallSans-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'KakaoSmallFont'; src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2503@1.0/KakaoSmallSans-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
  </style>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <title>고룸 GOROOM</title>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="고룸 GOROOM"/>
  <meta property="og:description" content="시간을 다양하게 담아내고, 서로의 시간을 공유해보세요."/>
  <meta property="og:image" content="/og-default.jpg"/>
  <meta property="og:site_name" content="고룸 GOROOM"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="고룸 GOROOM"/>
  <meta name="twitter:description" content="시간을 다양하게 담아내고, 서로의 시간을 공유해보세요."/>
  <meta name="twitter:image" content="/og-default.jpg"/>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=be8fea4f70cb373ac25d204ed1c375b7&autoload=false&libraries=services"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    #root { min-height: 100vh; }
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>
  <div id="gr-boot-splash">
    <div class="gr-boot-cloud">
      <img src="/icon-512.png" alt="고룸" />
    </div>
  </div>
  <style>
    #gr-boot-splash{
      position:fixed;inset:0;z-index:99999;
      background:#c3262f;
      display:flex;align-items:center;justify-content:center;
      transition:opacity .35s ease;
    }
    #gr-boot-splash.hide{opacity:0;pointer-events:none}
    .gr-boot-cloud{
      width:44vw;max-width:220px;min-width:140px;
      aspect-ratio:1/1;
      animation:grCloudFloat 1.6s ease-in-out infinite;
      will-change:transform,filter;
    }
    .gr-boot-cloud img{
      width:100%;height:100%;object-fit:contain;
    }
    @keyframes grCloudFloat{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-14px) scale(1.02)}
    }
  </style>
  <script>
    (function(){
      var MIN_SHOW = 2200; // 최소 2.2초 (둥둥 한 사이클 보여주기)
      var start = Date.now();
      function dismiss(){
        var el=document.getElementById('gr-boot-splash');
        if(el){el.classList.add('hide');setTimeout(function(){el&&el.remove()},500)}
      }
      function tryHide(){
        if(window.__GR_READY__){
          var elapsed = Date.now() - start;
          if(elapsed < MIN_SHOW){
            setTimeout(dismiss, MIN_SHOW - elapsed);
          } else {
            dismiss();
          }
          return;
        }
        setTimeout(tryHide,80);
      }
      tryHide();
      // 안전장치: 6초 지나면 무조건 제거
      setTimeout(dismiss, 6000);
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
