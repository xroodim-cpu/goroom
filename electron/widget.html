<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구롬 위젯</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Malgun Gothic', '맑은 고딕', sans-serif;
  background: transparent;
  overflow: hidden;
  user-select: none;
  -webkit-app-region: drag;
}
.widget {
  width: 300px;
  margin: 10px;
  background: rgba(255,255,255,0.97);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  max-height: 400px;
}
.widget-header {
  padding: 16px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #f0f0f0;
}
.widget-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
}
.widget-date {
  font-size: 12px;
  color: #888;
  margin-top: 2px;
}
.widget-actions {
  display: flex;
  gap: 6px;
  -webkit-app-region: no-drag;
}
.widget-btn {
  width: 28px; height: 28px;
  border: none; border-radius: 50%;
  background: #f5f5f5;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #666;
  transition: background 0.15s;
}
.widget-btn:hover { background: #eee; }
.widget-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  -webkit-app-region: no-drag;
}
.widget-list::-webkit-scrollbar { width: 4px; }
.widget-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.schedule-item {
  display: flex;
  align-items: stretch;
  padding: 10px 16px;
  gap: 10px;
  cursor: pointer;
  transition: background 0.12s;
}
.schedule-item:hover { background: #f8f8f8; }
.schedule-bar {
  width: 4px;
  border-radius: 2px;
  flex-shrink: 0;
  min-height: 32px;
}
.schedule-info { flex: 1; min-width: 0; }
.schedule-title {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a1a;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.schedule-time {
  font-size: 11px;
  color: #888;
  margin-top: 3px;
}
.empty-state {
  padding: 40px 16px;
  text-align: center;
  color: #aaa;
  font-size: 13px;
}
.empty-icon {
  font-size: 32px;
  margin-bottom: 8px;
}
.loading {
  padding: 40px 16px;
  text-align: center;
  color: #aaa;
  font-size: 13px;
}
.widget-footer {
  padding: 8px 16px;
  border-top: 1px solid #f0f0f0;
  text-align: center;
  -webkit-app-region: no-drag;
}
.footer-link {
  font-size: 12px;
  color: #cc222c;
  text-decoration: none;
  cursor: pointer;
  font-weight: 500;
}
.footer-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="widget">
  <div class="widget-header">
    <div>
      <div class="widget-title">오늘의 일정</div>
      <div class="widget-date" id="dateLabel"></div>
    </div>
    <div class="widget-actions">
      <button class="widget-btn" id="refreshBtn" title="새로고침">↻</button>
      <button class="widget-btn" id="closeBtn" title="닫기">✕</button>
    </div>
  </div>

  <div class="widget-list" id="scheduleList">
    <div class="loading">일정을 불러오는 중...</div>
  </div>

  <div class="widget-footer">
    <span class="footer-link" id="openAppBtn">구롬 열기 →</span>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dyotbojxtcqhcmrefofb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5b3Rib2p4dGNxaGNtcmVmb2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTU2NTIsImV4cCI6MjA5MDI5MTY1Mn0.dJp5-vqXoW_9s-Br2vyn8sx2fo2wDWpNWlr5tqgddqo';
const REST = `${SUPABASE_URL}/rest/v1`;
const HDR = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

const DAYS_KO = ['일', '월', '화', '수', '목', '금', '토'];
const COLORS = ['#cc222c','#e67e22','#27ae60','#3498db','#9b59b6','#1abc9c','#f39c12','#e74c3c','#2ecc71','#8e44ad'];

// Format date
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Set date label
const now = new Date();
document.getElementById('dateLabel').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${DAYS_KO[now.getDay()]})`;

// Fetch helper
async function sbGet(path) {
  const r = await fetch(`${REST}${path}`, { headers: HDR });
  return r.json();
}

// Get userId from localStorage (shared with web app)
function getUserId() {
  try {
    // Electron stores localStorage per origin — try reading from file
    const stored = localStorage.getItem('gr_widget_user');
    if (stored) return stored;
  } catch {}
  return null;
}

// Recurring schedule check for today
function isRecurringToday(s, today) {
  const orig = new Date(s.date + 'T00:00:00');
  if (orig > today) return false;
  if (!s.repeat) return false;

  const { type, interval, endDate } = s.repeat;
  const end = endDate ? new Date(endDate + 'T23:59:59') : new Date(today.getFullYear() + 2, 0, 1);
  if (end < today) return false;

  const diffDays = Math.floor((today - orig) / 86400000);

  if (type === 'daily') return true;
  if (type === 'weekly') return diffDays % 7 === 0;
  if (type === 'monthly') return today.getDate() === orig.getDate();
  if (type === 'yearly') return today.getMonth() === orig.getMonth() && today.getDate() === orig.getDate();
  if (type === 'custom') return diffDays % (interval || 1) === 0;
  return false;
}

// Main fetch
async function loadSchedules() {
  const list = document.getElementById('scheduleList');
  const todayStr = fmtDate(now);

  try {
    // userId: try widget user or fetch all rooms for any user
    const userId = getUserId();
    let roomIds = [];

    if (userId) {
      const members = await sbGet(`/goroom_room_members?user_id=eq.${userId}&select=room_id`);
      roomIds = members.map(m => m.room_id);
    }

    if (roomIds.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div>로그인 후 일정을 확인하세요</div>';
      return;
    }

    // Fetch schedules: today + recurring
    const roomFilter = roomIds.map(id => `"${id}"`).join(',');
    const schedules = await sbGet(`/goroom_schedules?room_id=in.(${roomFilter})&select=*`);

    // Filter: today's date OR recurring that falls on today
    const todaySchedules = [];
    for (const s of schedules) {
      if (s.date === todayStr) { todaySchedules.push(s); continue; }
      if (s.repeat && isRecurringToday(s, now)) { todaySchedules.push({ ...s, date: todayStr, _recurring: true }); }
    }

    // Sort by time
    todaySchedules.sort((a, b) => {
      const ta = a.start_time || '99:99';
      const tb = b.start_time || '99:99';
      return ta.localeCompare(tb);
    });

    if (todaySchedules.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">✨</div>오늘 일정이 없습니다</div>';
      return;
    }

    list.innerHTML = todaySchedules.map((s, i) => {
      const color = s.color || COLORS[i % COLORS.length];
      let timeText = '종일';
      if (s.start_time) {
        timeText = s.start_time.slice(0, 5);
        if (s.end_time) timeText += ' - ' + s.end_time.slice(0, 5);
      }
      return `<div class="schedule-item" onclick="window.electronAPI && window.electronAPI.openMain()">
        <div class="schedule-bar" style="background:${color}"></div>
        <div class="schedule-info">
          <div class="schedule-title">${escHtml(s.title || '(제목 없음)')}</div>
          <div class="schedule-time">${timeText}</div>
        </div>
      </div>`;
    }).join('');

  } catch (err) {
    console.error('Widget fetch error:', err);
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>일정을 불러올 수 없습니다</div>';
  }
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Buttons
document.getElementById('closeBtn').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.closeWidget();
});
document.getElementById('refreshBtn').addEventListener('click', loadSchedules);
document.getElementById('openAppBtn').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.openMain();
});

// Initial load + auto-refresh every 30 minutes
loadSchedules();
setInterval(loadSchedules, 30 * 60 * 1000);
</script>

</body>
</html>
